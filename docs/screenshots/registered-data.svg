<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="660" style="font-family: 'Segoe UI', sans-serif;">
  <!-- Window background -->
  <rect width="1200" height="660" fill="#12111a"/>
  <!-- Title bar -->
  <rect width="1200" height="42" fill="#1c1b2b"/>
  <text x="16" y="27" fill="white" font-size="15" font-weight="600">NodeKit — Tool Authoring Console</text>

  <!-- Left nav -->
  <rect x="0" y="42" width="180" height="618" fill="#16151f"/>
  <text x="16" y="68" fill="#888" font-size="10">MENU</text>
  <text x="18" y="96" fill="#ccc" font-size="13">Tool 정의</text>
  <text x="18" y="130" fill="#ccc" font-size="13">등록된 Tools</text>
  <!-- 등록된 Data (active) -->
  <rect x="0" y="142" width="180" height="34" fill="#2a2844"/>
  <text x="18" y="164" fill="white" font-size="13" font-weight="600">등록된 Data</text>
  <text x="18" y="198" fill="#ccc" font-size="13">정책 관리</text>
  <rect x="8" y="212" width="164" height="1" fill="#333"/>
  <text x="18" y="232" fill="#888" font-size="13">⚙ 서버 설정</text>

  <!-- Main content -->
  <rect x="180" y="42" width="1020" height="618" fill="#12111a"/>
  <g transform="translate(200, 62)">

    <!-- Heading + refresh -->
    <text x="0" y="28" fill="white" font-size="18" font-weight="600">등록된 Data</text>
    <rect x="660" y="8" width="100" height="30" rx="4" fill="#1e1d2e" stroke="#333" stroke-width="1"/>
    <text x="676" y="28" fill="#4a9eff" font-size="12">↻ 새로고침</text>

    <!-- Column headers -->
    <rect x="0" y="44" width="760" height="30" rx="2" fill="#1e1d2e"/>
    <text x="10" y="63" fill="#888" font-size="11">이름</text>
    <text x="170" y="63" fill="#888" font-size="11">버전</text>
    <text x="250" y="63" fill="#888" font-size="11">형식</text>
    <text x="340" y="63" fill="#888" font-size="11">카테고리</text>
    <text x="460" y="63" fill="#888" font-size="11">Lifecycle</text>
    <text x="548" y="63" fill="#888" font-size="11">Health</text>
    <text x="640" y="63" fill="#888" font-size="11">CAS hash</text>

    <!-- Row 1 -->
    <rect x="0" y="76" width="760" height="36" fill="#131220"/>
    <text x="10" y="99" fill="white" font-size="13">hg38-reference</text>
    <text x="170" y="99" fill="#ccc" font-size="12">2024-01</text>
    <text x="250" y="99" fill="#ccc" font-size="12">FASTA</text>
    <text x="340" y="99" fill="#ccc" font-size="12">genome</text>
    <rect x="458" y="83" width="60" height="20" rx="3" fill="#0d2e15"/>
    <text x="466" y="97" fill="#2ecc71" font-size="11">Active</text>
    <rect x="546" y="83" width="64" height="20" rx="3" fill="#0d2e15"/>
    <text x="552" y="97" fill="#2ecc71" font-size="11">Healthy</text>
    <text x="640" y="99" fill="#888" font-size="11" font-family="monospace">b9c0d1e2…</text>

    <!-- Row 2 -->
    <rect x="0" y="114" width="760" height="36" fill="#12111a"/>
    <text x="10" y="137" fill="white" font-size="13">dbSNP-v155</text>
    <text x="170" y="137" fill="#ccc" font-size="12">155</text>
    <text x="250" y="137" fill="#ccc" font-size="12">VCF</text>
    <text x="340" y="137" fill="#ccc" font-size="12">variant</text>
    <rect x="458" y="121" width="60" height="20" rx="3" fill="#0d2e15"/>
    <text x="466" y="135" fill="#2ecc71" font-size="11">Active</text>
    <rect x="546" y="121" width="64" height="20" rx="3" fill="#1a1a0d"/>
    <text x="552" y="135" fill="#f39c12" font-size="11">Partial</text>
    <text x="640" y="137" fill="#888" font-size="11" font-family="monospace">e3f4a5b6…</text>

    <!-- Count -->
    <text x="0" y="180" fill="#666" font-size="12">2개 항목 (Active: 2)</text>

  </g>

  <!-- Status bar -->
  <rect x="0" y="618" width="1200" height="42" fill="#0d0c18"/>
  <text x="16" y="643" fill="#666" font-size="11">Catalog 서비스 연결됨 — catalog.10.113.24.96.nip.io:8080</text>
</svg>
