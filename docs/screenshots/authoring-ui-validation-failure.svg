<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" style="font-family: 'Segoe UI', sans-serif;">
  <!-- Window background -->
  <rect width="1200" height="900" fill="#12111a"/>

  <!-- Top title bar -->
  <rect width="1200" height="42" fill="#1c1b2b"/>
  <text x="16" y="27" fill="white" font-size="15" font-weight="600">NodeKit — Tool Authoring Console</text>

  <!-- Left nav panel -->
  <rect x="0" y="42" width="180" height="858" fill="#16151f"/>
  <text x="16" y="68" fill="#888" font-size="10">MENU</text>
  <text x="18" y="96" fill="white" font-size="13">Tool 정의</text>
  <text x="18" y="134" fill="white" font-size="13">등록된 Tools</text>
  <text x="18" y="172" fill="white" font-size="13">정책 관리</text>

  <!-- Main content area -->
  <rect x="180" y="42" width="1020" height="828" fill="#12111a"/>

  <g transform="translate(200, 62)">
    <text x="0" y="28" fill="white" font-size="18" font-weight="600">Tool 정의</text>

    <!-- Tool 이름 (filled) -->
    <text x="0" y="62" fill="#aaa" font-size="12">Tool 이름</text>
    <rect x="0" y="68" width="720" height="34" rx="3" fill="#1e1d2e" stroke="#333" stroke-width="1"/>
    <text x="10" y="89" fill="white" font-size="13">BWA-MEM2</text>

    <!-- 이미지 URI (invalid - no digest) -->
    <text x="0" y="122" fill="#aaa" font-size="12">컨테이너 이미지 URI (digest 포함 필수)</text>
    <rect x="0" y="128" width="720" height="34" rx="3" fill="#1e1d2e" stroke="#c0392b" stroke-width="1"/>
    <text x="10" y="149" fill="white" font-size="13">registry.example.com/bwa-mem2:latest</text>

    <!-- Dockerfile (invalid - no AS builder) -->
    <text x="0" y="182" fill="#aaa" font-size="12">Dockerfile</text>
    <rect x="0" y="188" width="720" height="120" rx="3" fill="#1e1d2e" stroke="#c0392b" stroke-width="1"/>
    <text x="10" y="208" fill="white" font-size="12" font-family="monospace">FROM ubuntu:22.04</text>
    <text x="10" y="224" fill="white" font-size="12" font-family="monospace">RUN apt-get update &amp;&amp; apt-get install -y bwa-mem2</text>

    <!-- Script -->
    <text x="0" y="328" fill="#aaa" font-size="12">실행 스크립트</text>
    <rect x="0" y="334" width="720" height="80" rx="3" fill="#1e1d2e" stroke="#333" stroke-width="1"/>

    <!-- I/O rows -->
    <text x="0" y="436" fill="#aaa" font-size="12">Inputs</text>
    <rect x="0" y="442" width="308" height="30" rx="3" fill="#1e1d2e" stroke="#333" stroke-width="1"/>
    <text x="10" y="462" fill="white" font-size="12">input.fastq.R1</text>
    <rect x="316" y="442" width="36" height="30" rx="3" fill="#2a1a1a" stroke="#c0392b" stroke-width="1"/>
    <text x="329" y="462" fill="#c0392b" font-size="14">×</text>
    <rect x="0" y="480" width="100" height="26" rx="3" fill="#1e1d2e" stroke="#333" stroke-width="1"/>
    <text x="8" y="497" fill="#4a9eff" font-size="12">+ Input 추가</text>

    <text x="368" y="436" fill="#aaa" font-size="12">Outputs</text>
    <rect x="368" y="442" width="308" height="30" rx="3" fill="#1e1d2e" stroke="#333" stroke-width="1"/>
    <text x="378" y="462" fill="white" font-size="12">output.bam</text>
    <rect x="684" y="442" width="36" height="30" rx="3" fill="#2a1a1a" stroke="#c0392b" stroke-width="1"/>
    <text x="697" y="462" fill="#c0392b" font-size="14">×</text>
    <rect x="368" y="480" width="108" height="26" rx="3" fill="#1e1d2e" stroke="#333" stroke-width="1"/>
    <text x="376" y="497" fill="#4a9eff" font-size="12">+ Output 추가</text>

    <!-- 환경 스펙 -->
    <text x="0" y="530" fill="#aaa" font-size="12">환경 스펙 파일 (conda yml / requirements.txt, 선택)</text>
    <rect x="0" y="536" width="720" height="80" rx="3" fill="#1e1d2e" stroke="#333" stroke-width="1"/>

    <!-- L1 검증 결과 (failure) -->
    <rect x="0" y="628" width="720" height="130" rx="4" fill="#1a1228" stroke="#c0392b" stroke-width="1"/>
    <text x="12" y="650" fill="#e74c3c" font-size="13" font-weight="600">L1 검증 결과</text>
    <text x="12" y="672" fill="#e74c3c" font-size="12">[L1-IMG-002] 이미지 URI에 ':latest' 태그는 허용되지 않습니다.</text>
    <text x="12" y="692" fill="#e74c3c" font-size="12">[L1-IMG-004] 이미지 URI에 digest (@sha256:...) 가 없습니다.</text>
    <text x="12" y="712" fill="#e74c3c" font-size="12">[DFM002] FROM 명령에 `AS builder` 별칭을 지정하세요.</text>
    <text x="12" y="732" fill="#e74c3c" font-size="12">[DFM002] (예: FROM ubuntu:20.04 AS builder)</text>

    <!-- Buttons -->
    <rect x="0" y="770" width="100" height="36" rx="4" fill="#2c3e88"/>
    <text x="18" y="793" fill="white" font-size="13">L1 검증</text>
    <rect x="116" y="770" width="220" height="36" rx="4" fill="#555"/>
    <text x="130" y="793" fill="#999" font-size="13">빌드 요청 전송 (NodeForge)</text>

  </g>

  <!-- Status bar -->
  <rect x="0" y="858" width="1200" height="42" fill="#0d0c18"/>
  <text x="16" y="883" fill="#e74c3c" font-size="11">L1 검증 실패 — 3개 위반</text>
</svg>
