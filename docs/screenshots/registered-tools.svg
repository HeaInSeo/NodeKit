<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" style="font-family: 'Segoe UI', sans-serif;">
  <!-- Window background -->
  <rect width="1200" height="700" fill="#12111a"/>
  <!-- Title bar -->
  <rect width="1200" height="42" fill="#1c1b2b"/>
  <text x="16" y="27" fill="white" font-size="15" font-weight="600">NodeKit — Tool Authoring Console</text>

  <!-- Left nav -->
  <rect x="0" y="42" width="180" height="658" fill="#16151f"/>
  <text x="16" y="68" fill="#888" font-size="10">MENU</text>
  <text x="18" y="96" fill="#ccc" font-size="13">Tool 정의</text>
  <!-- 등록된 Tools (active) -->
  <rect x="0" y="108" width="180" height="34" fill="#2a2844"/>
  <text x="18" y="130" fill="white" font-size="13" font-weight="600">등록된 Tools</text>
  <text x="18" y="164" fill="#ccc" font-size="13">등록된 Data</text>
  <text x="18" y="198" fill="#ccc" font-size="13">정책 관리</text>
  <rect x="8" y="212" width="164" height="1" fill="#333"/>
  <text x="18" y="232" fill="#888" font-size="13">⚙ 서버 설정</text>

  <!-- Main content -->
  <rect x="180" y="42" width="1020" height="658" fill="#12111a"/>
  <g transform="translate(200, 62)">

    <!-- Heading + refresh -->
    <text x="0" y="28" fill="white" font-size="18" font-weight="600">등록된 Tools</text>
    <rect x="660" y="8" width="100" height="30" rx="4" fill="#1e1d2e" stroke="#333" stroke-width="1"/>
    <text x="676" y="28" fill="#4a9eff" font-size="12">↻ 새로고침</text>

    <!-- Column headers -->
    <rect x="0" y="44" width="760" height="30" rx="2" fill="#1e1d2e"/>
    <text x="10" y="63" fill="#888" font-size="11">Tool 이름</text>
    <text x="170" y="63" fill="#888" font-size="11">버전</text>
    <text x="250" y="63" fill="#888" font-size="11">StableRef</text>
    <text x="430" y="63" fill="#888" font-size="11">Lifecycle</text>
    <text x="520" y="63" fill="#888" font-size="11">Health</text>
    <text x="610" y="63" fill="#888" font-size="11">CAS hash</text>

    <!-- Row 1 — Active / Healthy -->
    <rect x="0" y="76" width="760" height="36" fill="#131220"/>
    <text x="10" y="99" fill="white" font-size="13">BWA-MEM2</text>
    <text x="170" y="99" fill="#ccc" font-size="12">2.2.1</text>
    <text x="250" y="99" fill="#ccc" font-size="12">BWA-MEM2@2.2.1</text>
    <rect x="428" y="83" width="60" height="20" rx="3" fill="#0d2e15"/>
    <text x="436" y="97" fill="#2ecc71" font-size="11">Active</text>
    <rect x="518" y="83" width="64" height="20" rx="3" fill="#0d2e15"/>
    <text x="524" y="97" fill="#2ecc71" font-size="11">Healthy</text>
    <text x="610" y="99" fill="#888" font-size="11" font-family="monospace">d3adbeef…</text>

    <!-- Row 2 — Active / Partial -->
    <rect x="0" y="114" width="760" height="36" fill="#12111a"/>
    <text x="10" y="137" fill="white" font-size="13">STAR-aligner</text>
    <text x="170" y="137" fill="#ccc" font-size="12">2.7.11a</text>
    <text x="250" y="137" fill="#ccc" font-size="12">STAR-aligner@2.7.11a</text>
    <rect x="428" y="121" width="60" height="20" rx="3" fill="#0d2e15"/>
    <text x="436" y="135" fill="#2ecc71" font-size="11">Active</text>
    <rect x="518" y="121" width="64" height="20" rx="3" fill="#1a1a0d"/>
    <text x="524" y="135" fill="#f39c12" font-size="11">Partial</text>
    <text x="610" y="137" fill="#888" font-size="11" font-family="monospace">a1b2c3d4…</text>

    <!-- Row 3 — Active / Healthy -->
    <rect x="0" y="152" width="760" height="36" fill="#131220"/>
    <text x="10" y="175" fill="white" font-size="13">samtools</text>
    <text x="170" y="175" fill="#ccc" font-size="12">1.21</text>
    <text x="250" y="175" fill="#ccc" font-size="12">samtools@1.21</text>
    <rect x="428" y="159" width="60" height="20" rx="3" fill="#0d2e15"/>
    <text x="436" y="173" fill="#2ecc71" font-size="11">Active</text>
    <rect x="518" y="159" width="64" height="20" rx="3" fill="#0d2e15"/>
    <text x="524" y="173" fill="#2ecc71" font-size="11">Healthy</text>
    <text x="610" y="175" fill="#888" font-size="11" font-family="monospace">f7e8a9b0…</text>

    <!-- Row 4 — Retracted -->
    <rect x="0" y="190" width="760" height="36" fill="#12111a"/>
    <text x="10" y="213" fill="#666" font-size="13">bowtie2 (구버전)</text>
    <text x="170" y="213" fill="#666" font-size="12">2.4.2</text>
    <text x="250" y="213" fill="#666" font-size="12">bowtie2@2.4.2</text>
    <rect x="428" y="197" width="74" height="20" rx="3" fill="#1a1220"/>
    <text x="432" y="211" fill="#9b59b6" font-size="11">Retracted</text>
    <rect x="518" y="197" width="64" height="20" rx="3" fill="#0d2e15"/>
    <text x="524" y="211" fill="#2ecc71" font-size="11">Healthy</text>
    <text x="610" y="213" fill="#555" font-size="11" font-family="monospace">c4d5e6f7…</text>

    <!-- Count -->
    <text x="0" y="256" fill="#666" font-size="12">4개 항목 (Active: 3, Retracted: 1)</text>

  </g>

  <!-- Status bar -->
  <rect x="0" y="658" width="1200" height="42" fill="#0d0c18"/>
  <text x="16" y="683" fill="#666" font-size="11">Catalog 서비스 연결됨 — catalog.10.113.24.96.nip.io:8080</text>
</svg>
